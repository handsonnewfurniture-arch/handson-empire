<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HandsOn Empire - Command Center</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0f1a;
      color: #f1f5f9;
      min-height: 100vh;
    }

    .header {
      background: #0f1623;
      border-bottom: 1px solid #1e293b;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-weight: 800; font-size: 20px; background: linear-gradient(135deg, #f97316, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .user { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #f97316, #ea580c); display: flex; align-items: center; justify-content: center; font-weight: 700; }

    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 12px;
      overflow-x: auto;
    }
    .tab {
      background: transparent;
      border: 1px solid transparent;
      color: #64748b;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .tab:hover { color: #94a3b8; }
    .tab.active {
      background: rgba(249,115,22,0.15);
      border-color: rgba(249,115,22,0.4);
      color: #f97316;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: #0f1623;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 18px;
    }
    .kpi-label { font-size: 11px; color: #64748b; font-weight: 600; margin-bottom: 8px; }
    .kpi-value { font-size: 28px; font-weight: 800; color: #f97316; margin-bottom: 4px; }
    .kpi-sub { font-size: 12px; color: #64748b; }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .chart-card {
      background: #0f1623;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 20px;
    }
    .chart-title { font-size: 13px; font-weight: 700; color: #64748b; margin-bottom: 16px; }

    .table {
      background: #0f1623;
      border: 1px solid #1e293b;
      border-radius: 12px;
      overflow: hidden;
    }
    .table-header {
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .table-row {
      padding: 12px 16px;
      border-bottom: 1px solid #0f1623;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }
    .table-row:hover { background: rgba(249,115,22,0.05); }

    .badge {
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-critical { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid #ef4444; }
    .badge-hot { background: rgba(249,115,22,0.15); color: #f97316; border: 1px solid #f97316; }
    .badge-success { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid #22c55e; }
    .badge-warning { background: rgba(234,179,8,0.15); color: #eab308; border: 1px solid #eab308; }

    .btn {
      background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.3);
      color: #f97316;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(249,115,22,0.25); }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-ok { background: #22c55e; }
    .status-warn { background: #f97316; }
    .status-error { background: #ef4444; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡ HandsOn Empire</div>
    <div class="user">
      <div>
        <div style="font-size: 13px; font-weight: 600;">Tiger McBride</div>
        <div style="font-size: 11px; color: #64748b;">Admin</div>
      </div>
      <div class="avatar">TM</div>
    </div>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="app.switchTab('overview')">Overview</button>
      <button class="tab" onclick="app.switchTab('leads')">Leads</button>
      <button class="tab" onclick="app.switchTab('workers')">Workers</button>
      <button class="tab" onclick="app.switchTab('revenue')">Revenue</button>
      <button class="tab" onclick="app.switchTab('scrapers')">Scrapers</button>
      <button class="tab" onclick="app.switchTab('analytics')">Analytics</button>
      <button class="tab" onclick="app.switchTab('customers')">Customers</button>
    </div>

    <!-- OVERVIEW TAB -->
    <div id="overview" class="tab-content active">
      <div class="kpi-grid" id="kpiGrid"></div>
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">WEEKLY LEAD ACTIVITY</div>
          <canvas id="weeklyChart"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">PIPELINE BY TRADE ($K)</div>
          <canvas id="tradeChart"></canvas>
        </div>
      </div>
      <div id="alerts"></div>
    </div>

    <!-- LEADS TAB -->
    <div id="leads" class="tab-content">
      <div class="table" id="leadsTable"></div>
    </div>

    <!-- WORKERS TAB -->
    <div id="workers" class="tab-content">
      <div id="workersGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px;"></div>
    </div>

    <!-- REVENUE TAB -->
    <div id="revenue" class="tab-content">
      <div class="kpi-grid" id="revenueKpis"></div>
      <div class="table" id="transactionsTable"></div>
    </div>

    <!-- SCRAPERS TAB -->
    <div id="scrapers" class="tab-content">
      <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
        <div style="font-size: 14px; color: #64748b;"><span id="scraperCount">0</span> scrapers configured</div>
        <button class="btn" onclick="app.runAllScrapers()">▶ Run All Scrapers</button>
      </div>
      <div id="scrapersTable"></div>
    </div>

    <!-- ANALYTICS TAB -->
    <div id="analytics" class="tab-content">
      <div class="chart-card" style="margin-bottom: 20px;">
        <div class="chart-title">LEAD FUNNEL</div>
        <div id="funnelChart"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">COMPETITIVE COMPARISON</div>
        <div id="comparisonTable"></div>
      </div>
    </div>

    <!-- CUSTOMERS TAB -->
    <div id="customers" class="tab-content">
      <div class="kpi-grid" id="customerKpis"></div>
      <div class="table" id="customersTable"></div>
    </div>
  </div>

  <script>
    const app = {
      currentTab: 'overview',
      leads: [],
      workers: [],
      scrapers: [],
      ws: null,

      async init() {
        await this.loadData();
        this.connectWebSocket();
        this.renderOverview();
        this.renderScrapers();
      },

      connectWebSocket() {
        this.ws = new WebSocket('ws://localhost:3000');

        this.ws.onopen = () => console.log('🔌 Admin connected');

        this.ws.onmessage = (event) => {
          const { event: eventType, data } = JSON.parse(event.data);

          if (eventType === 'NEW_LEAD') {
            this.leads.unshift(data);
            this.renderOverview();
          }
        };

        this.ws.onclose = () => {
          console.log('🔌 Disconnected - reconnecting...');
          setTimeout(() => this.connectWebSocket(), 3000);
        };
      },

      async loadData() {
        try {
          const [leadsRes, workersRes] = await Promise.all([
            fetch('http://localhost:3000/api/leads'),
            fetch('http://localhost:3000/api/workers')
          ]);

          const { leads } = await leadsRes.json();
          const { workers } = await workersRes.json();

          this.leads = leads || [];
          this.workers = workers || [];

          // Mock scrapers data
          this.scrapers = this.generateMockScrapers();
        } catch (error) {
          console.error('Error loading data:', error);
          // Use mock data
          this.leads = this.generateMockLeads();
          this.workers = this.generateMockWorkers();
          this.scrapers = this.generateMockScrapers();
        }
      },

      generateMockLeads() {
        const trades = ['movers', 'roofing', 'hvac', 'storage', 'dumpster'];
        const priorities = ['CRITICAL', 'HOT', 'WARM'];
        const cities = ['Denver', 'Aurora', 'Boulder', 'Lakewood'];

        return Array.from({ length: 50 }, (_, i) => ({
          id: `lead-${i}`,
          trade: trades[Math.floor(Math.random() * trades.length)],
          title: `Sample lead ${i + 1}`,
          city: cities[Math.floor(Math.random() * cities.length)],
          priority: priorities[Math.floor(Math.random() * priorities.length)],
          score: 50 + Math.floor(Math.random() * 50),
          revenue: 1000 + Math.floor(Math.random() * 10000),
          source: 'Craigslist',
          status: Math.random() > 0.7 ? 'CLAIMED' : 'NEW'
        }));
      },

      generateMockWorkers() {
        return [
          { id: 'w1', name: 'Marcus T.', trades: ['movers'], rating: 4.9, jobs: 847, status: 'available', tier: 'Elite' },
          { id: 'w2', name: 'Sarah K.', trades: ['roofing'], rating: 4.8, jobs: 312, status: 'available', tier: 'Pro' },
          { id: 'w3', name: 'Diego R.', trades: ['electrical', 'plumbing'], rating: 4.9, jobs: 1204, status: 'on_job', tier: 'Elite' },
          { id: 'w4', name: 'James W.', trades: ['solar'], rating: 5.0, jobs: 89, status: 'available', tier: 'Elite' },
          { id: 'w5', name: 'Carlos F.', trades: ['movers', 'dumpster'], rating: 4.8, jobs: 2341, status: 'available', tier: 'Elite' }
        ];
      },

      generateMockScrapers() {
        return [
          { name: 'Craigslist — Denver', status: 'ok', last: '2 min ago', leads: 24 },
          { name: 'Craigslist — Aurora', status: 'ok', last: '3 min ago', leads: 11 },
          { name: 'Craigslist — Boulder', status: 'ok', last: '4 min ago', leads: 8 },
          { name: 'StorageAuctions.com', status: 'ok', last: '45 min ago', leads: 18 },
          { name: 'City Permits — Denver', status: 'ok', last: '20 min ago', leads: 14 },
          { name: 'Reddit — r/Denver', status: 'ok', last: '8 min ago', leads: 12 },
          { name: 'NOAA Storm Reports', status: 'ok', last: '15 min ago', leads: 3 },
          { name: 'Eviction Court — Denver', status: 'ok', last: '30 min ago', leads: 8 },
          { name: 'Nextdoor Mentions', status: 'warn', last: '45 min ago', leads: 5 },
          { name: 'HOA Violations Feed', status: 'error', last: '4 hr ago', leads: 0 }
        ];
      },

      switchTab(tab) {
        this.currentTab = tab;

        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

        event.target.classList.add('active');
        document.getElementById(tab).classList.add('active');

        if (tab === 'leads') this.renderLeads();
        if (tab === 'workers') this.renderWorkers();
        if (tab === 'revenue') this.renderRevenue();
        if (tab === 'scrapers') this.renderScrapers();
        if (tab === 'analytics') this.renderAnalytics();
        if (tab === 'customers') this.renderCustomers();
      },

      renderOverview() {
        const critCount = this.leads.filter(l => l.priority === 'CRITICAL').length;
        const pipeline = this.leads.reduce((sum, l) => sum + (l.revenue || 0), 0);
        const claimedCount = this.leads.filter(l => l.status === 'CLAIMED').length;

        document.getElementById('kpiGrid').innerHTML = `
          <div class="kpi-card">
            <div class="kpi-label">TOTAL LEADS</div>
            <div class="kpi-value">${this.leads.length}</div>
            <div class="kpi-sub">All sources</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">PIPELINE VALUE</div>
            <div class="kpi-value" style="color: #22c55e;">$${pipeline.toLocaleString()}</div>
            <div class="kpi-sub">Estimated total</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">CRITICAL LEADS</div>
            <div class="kpi-value" style="color: #ef4444;">${critCount}</div>
            <div class="kpi-sub">Need immediate attention</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">ACTIVE WORKERS</div>
            <div class="kpi-value">${this.workers.length}</div>
            <div class="kpi-sub">${this.workers.filter(w => w.status === 'available').length} available</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">CLAIMED TODAY</div>
            <div class="kpi-value" style="color: #f97316;">${claimedCount}</div>
            <div class="kpi-sub">${Math.round(claimedCount/this.leads.length*100)}% conversion</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">SCRAPERS ACTIVE</div>
            <div class="kpi-value">${this.scrapers.filter(s => s.status === 'ok').length}</div>
            <div class="kpi-sub">of ${this.scrapers.length} total</div>
          </div>
        `;

        this.renderWeeklyChart();
        this.renderTradeChart();
        this.renderAlerts();
      },

      renderWeeklyChart() {
        const ctx = document.getElementById('weeklyChart');
        if (!ctx) return;

        new Chart(ctx, {
          type: 'line',
          data: {
            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
            datasets: [
              {
                label: 'Leads',
                data: [14, 22, 18, 31, 28, 12, 9],
                borderColor: '#f97316',
                backgroundColor: 'rgba(249, 115, 22, 0.1)',
                tension: 0.4
              },
              {
                label: 'Claimed',
                data: [8, 15, 11, 20, 19, 7, 5],
                borderColor: '#22c55e',
                backgroundColor: 'rgba(34, 197, 94, 0.1)',
                tension: 0.4
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: { legend: { labels: { color: '#94a3b8' } } },
            scales: {
              y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
              x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } }
            }
          }
        });
      },

      renderTradeChart() {
        const ctx = document.getElementById('tradeChart');
        if (!ctx) return;

        const tradeData = {};
        this.leads.forEach(l => {
          if (!tradeData[l.trade]) tradeData[l.trade] = 0;
          tradeData[l.trade] += l.revenue;
        });

        const trades = Object.keys(tradeData).slice(0, 8);
        const values = trades.map(t => tradeData[t] / 1000);

        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: trades,
            datasets: [{
              label: 'Pipeline ($K)',
              data: values,
              backgroundColor: '#f97316',
              borderRadius: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: { legend: { display: false } },
            scales: {
              y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
              x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } }
            }
          }
        });
      },

      renderAlerts() {
        const critCount = this.leads.filter(l => l.priority === 'CRITICAL').length;
        const errorScrapers = this.scrapers.filter(s => s.status === 'error');

        const alerts = [];

        if (critCount > 0) {
          alerts.push({ type: 'error', msg: `🚨 ${critCount} CRITICAL leads need immediate attention` });
        }

        if (errorScrapers.length > 0) {
          alerts.push({ type: 'warning', msg: `⚠️ ${errorScrapers[0].name} has been down for ${errorScrapers[0].last}` });
        } else {
          alerts.push({ type: 'success', msg: `✅ All scrapers running normally — ${this.leads.length} leads in pipeline` });
        }

        document.getElementById('alerts').innerHTML = alerts.map(a => `
          <div style="background: rgba(${a.type === 'error' ? '239,68,68' : a.type === 'warning' ? '234,179,8' : '34,197,94'}, 0.1); border: 1px solid rgba(${a.type === 'error' ? '239,68,68' : a.type === 'warning' ? '234,179,8' : '34,197,94'}, 0.25); border-radius: 8px; padding: 10px 16px; font-size: 13px; margin-bottom: 8px;">
            ${a.msg}
          </div>
        `).join('');
      },

      renderLeads() {
        const rows = this.leads.map(l => `
          <div class="table-row">
            <div style="flex: 2; min-width: 0;">
              <div style="font-size: 13px; font-weight: 600; color: #e2e8f0; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${l.title}</div>
              <div style="font-size: 11px; color: #64748b;">${l.city} · ${l.source}</div>
            </div>
            <span class="badge badge-${l.priority.toLowerCase()}">${l.priority}</span>
            <span style="font-size: 13px; font-weight: 700; color: #22c55e; min-width: 80px; text-align: right;">$${l.revenue.toLocaleString()}</span>
            <span style="font-size: 12px; color: #64748b; min-width: 40px; text-align: right;">${l.score}</span>
          </div>
        `).join('');

        document.getElementById('leadsTable').innerHTML = `
          <div class="table-header">
            <span>ALL LEADS (${this.leads.length})</span>
            <button class="btn" onclick="app.runAllScrapers()">Refresh</button>
          </div>
          ${rows}
        `;
      },

      renderWorkers() {
        document.getElementById('workersGrid').innerHTML = this.workers.map(w => `
          <div style="background: #0f1623; border: 1px solid #1e293b; border-radius: 12px; padding: 16px;">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
              <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #f97316, #ea580c); display: flex; align-items: center; justify-content: center; font-size: 18px;">
                ${w.name.charAt(0)}
              </div>
              <div style="flex: 1;">
                <div style="font-weight: 700; font-size: 15px;">${w.name}</div>
                <div style="display: flex; align-items: center; gap: 6px; margin-top: 4px;">
                  <span class="badge badge-${w.tier === 'Elite' ? 'hot' : 'success'}">${w.tier}</span>
                  <span class="status-dot status-${w.status === 'available' ? 'ok' : 'warn'}"></span>
                  <span style="font-size: 11px; color: #64748b;">${w.status === 'available' ? 'Available' : 'On Job'}</span>
                </div>
              </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px;">
              <div style="background: #0a0f1a; border-radius: 6px; padding: 6px 8px;">
                <div style="font-size: 9px; color: #475569; font-weight: 600;">RATING</div>
                <div style="font-size: 13px; font-weight: 700; color: #fbbf24;">${'★'.repeat(Math.round(w.rating))} ${w.rating}</div>
              </div>
              <div style="background: #0a0f1a; border-radius: 6px; padding: 6px 8px;">
                <div style="font-size: 9px; color: #475569; font-weight: 600;">JOBS</div>
                <div style="font-size: 13px; font-weight: 700;">${w.jobs.toLocaleString()}</div>
              </div>
            </div>
            <div style="font-size: 12px; color: #64748b; margin-bottom: 8px;">${w.trades.join(', ')}</div>
          </div>
        `).join('');
      },

      renderRevenue() {
        document.getElementById('revenueKpis').innerHTML = `
          <div class="kpi-card">
            <div class="kpi-label">GMV (30d)</div>
            <div class="kpi-value" style="color: #22c55e;">$84,200</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">PLATFORM FEES (8%)</div>
            <div class="kpi-value" style="color: #f97316;">$6,736</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">SUBSCRIPTION MRR</div>
            <div class="kpi-value" style="color: #3b82f6;">$4,890</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">LEAD CREDITS</div>
            <div class="kpi-value" style="color: #a855f7;">$1,240</div>
          </div>
        `;

        const transactions = [
          { type: 'completion', label: 'Moving Job — Marcus T.', amount: '+$224.00', color: '#22c55e' },
          { type: 'subscription', label: 'Elite Plan — Diego R.', amount: '+$99.00', color: '#3b82f6' },
          { type: 'completion', label: 'Solar Install — James W.', amount: '+$2,000.00', color: '#22c55e' },
          { type: 'credit', label: 'Lead Credit — Carlos F.', amount: '+$25.00', color: '#a855f7' },
          { type: 'completion', label: 'Roof Repair — Sarah K.', amount: '+$680.00', color: '#22c55e' }
        ];

        document.getElementById('transactionsTable').innerHTML = `
          <div class="table-header">RECENT TRANSACTIONS</div>
          ${transactions.map(tx => `
            <div class="table-row">
              <div style="flex: 1;">
                <span class="badge" style="background: ${tx.color}20; color: ${tx.color}; border: 1px solid ${tx.color}40; margin-right: 8px;">${tx.type.toUpperCase()}</span>
                <span style="font-size: 13px; color: #e2e8f0;">${tx.label}</span>
              </div>
              <span style="font-size: 14px; font-weight: 700; color: ${tx.color};">${tx.amount}</span>
            </div>
          `).join('')}
        `;
      },

      renderScrapers() {
        document.getElementById('scraperCount').textContent = this.scrapers.length;

        const rows = this.scrapers.map(s => `
          <div class="table-row">
            <span class="status-dot status-${s.status} ${s.status === 'ok' ? 'pulse' : ''}"></span>
            <span style="flex: 1; font-size: 13px; color: #e2e8f0;">${s.name}</span>
            <span style="font-size: 11px; color: #475569;">${s.last}</span>
            <span style="font-size: 11px; color: #64748b; width: 60px; text-align: right;">${s.leads} leads</span>
            <button class="btn" style="padding: 4px 10px; font-size: 11px;" onclick="app.runScraper('${s.name}')">Run</button>
          </div>
        `).join('');

        document.getElementById('scrapersTable').innerHTML = `
          <div style="background: #0f1623; border: 1px solid #1e293b; border-radius: 12px; overflow: hidden;">
            ${rows}
          </div>
        `;
      },

      renderAnalytics() {
        const totalLeads = this.leads.length;
        const critCount = this.leads.filter(l => l.priority === 'CRITICAL').length;
        const phoneCount = this.leads.filter(l => l.phone).length;
        const claimedCount = this.leads.filter(l => l.status === 'CLAIMED').length;
        const bookedCount = Math.round(claimedCount * 0.7);

        const funnel = [
          { label: 'Scraped', count: totalLeads, pct: 100 },
          { label: 'Critical Priority', count: critCount, pct: Math.round(critCount/totalLeads*100) },
          { label: 'With Phone', count: phoneCount, pct: Math.round(phoneCount/totalLeads*100) },
          { label: 'Claimed', count: claimedCount, pct: Math.round(claimedCount/totalLeads*100) },
          { label: 'Booked', count: bookedCount, pct: Math.round(bookedCount/totalLeads*100) }
        ];

        document.getElementById('funnelChart').innerHTML = funnel.map(f => `
          <div style="margin-bottom: 10px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
              <span style="font-size: 13px; color: #e2e8f0;">${f.label}</span>
              <span style="font-size: 13px; font-weight: 700; color: #f97316;">${f.count} (${f.pct}%)</span>
            </div>
            <div style="height: 6px; background: #1e293b; border-radius: 3px;">
              <div style="width: ${f.pct}%; height: 100%; background: #f97316; border-radius: 3px;"></div>
            </div>
          </div>
        `).join('');

        const comparison = [
          { name: 'Thumbtack', rating: '2.3★', model: 'Sells to 6', cost: '$15-$150/lead' },
          { name: 'Angi', rating: '1.9★', model: 'Sells to 4-8', cost: '$300+/mo' },
          { name: 'TaskRabbit', rating: '3.8★', model: 'Gig marketplace', cost: '15-30% cut' },
          { name: 'HandsOn', rating: '4.9★', model: '1 lead = 1 buyer', cost: '8% on completion', highlight: true }
        ];

        document.getElementById('comparisonTable').innerHTML = comparison.map(p => `
          <div style="background: ${p.highlight ? 'rgba(249,115,22,0.08)' : '#0f1623'}; border: 1px solid ${p.highlight ? 'rgba(249,115,22,0.25)' : '#1e293b'}; border-radius: 8px; padding: 10px 16px; margin-bottom: 6px; display: flex; gap: 16px; align-items: center;">
            <span style="width: 90px; font-size: 13px; font-weight: ${p.highlight ? 700 : 400}; color: ${p.highlight ? '#f97316' : '#e2e8f0'};">${p.name}</span>
            <span style="width: 50px; font-size: 13px; color: ${p.highlight ? '#fbbf24' : '#94a3b8'};">${p.rating}</span>
            <span style="flex: 1; font-size: 12px; color: #94a3b8;">${p.model}</span>
            <span style="font-size: 12px; color: ${p.highlight ? '#22c55e' : '#64748b'};">${p.cost}</span>
          </div>
        `).join('');
      },

      renderCustomers() {
        document.getElementById('customerKpis').innerHTML = `
          <div class="kpi-card">
            <div class="kpi-label">TOTAL CUSTOMERS</div>
            <div class="kpi-value">342</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">ACTIVE (30d)</div>
            <div class="kpi-value" style="color: #22c55e;">89</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">AVG LTV</div>
            <div class="kpi-value" style="color: #f97316;">$1,840</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">NPS SCORE</div>
            <div class="kpi-value" style="color: #3b82f6;">72</div>
            <div class="kpi-sub">Excellent</div>
          </div>
        `;

        const customers = [
          { name: 'Jennifer M.', city: 'Denver', jobs: 4, spend: 9200, status: 'Active' },
          { name: 'Robert K.', city: 'Aurora', jobs: 2, spend: 3800, status: 'Active' },
          { name: 'Maria S.', city: 'Boulder', jobs: 6, spend: 15400, status: 'Active' },
          { name: 'David L.', city: 'Lakewood', jobs: 1, spend: 450, status: 'New' }
        ];

        document.getElementById('customersTable').innerHTML = `
          <div class="table-header">CUSTOMER DATABASE</div>
          ${customers.map(c => `
            <div class="table-row">
              <div style="flex: 1;">
                <div style="font-size: 14px; font-weight: 600; color: #e2e8f0;">${c.name}</div>
                <div style="font-size: 11px; color: #64748b;">${c.city}</div>
              </div>
              <div style="text-align: center; min-width: 50px;">
                <div style="font-size: 13px; font-weight: 700;">${c.jobs}</div>
                <div style="font-size: 10px; color: #64748b;">jobs</div>
              </div>
              <div style="text-align: center; min-width: 80px;">
                <div style="font-size: 13px; font-weight: 700; color: #22c55e;">$${c.spend.toLocaleString()}</div>
                <div style="font-size: 10px; color: #64748b;">spend</div>
              </div>
              <span class="badge badge-${c.status === 'Active' ? 'success' : 'hot'}">${c.status}</span>
            </div>
          `).join('')}
        `;
      },

      async runScraper(name) {
        alert(`Running scraper: ${name}`);
        // In production: POST to /api/scrape
      },

      async runAllScrapers() {
        alert('Running all 37 scrapers... This will take a few minutes.');
        // In production: POST to /api/scrape with source=all
      }
    };

    app.init();
  </script>
</body>
</html>
